name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 16 * * *'  # 10:00 AM MT = 16:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build updated dashboard
        env:
          JONNY_TOKEN: ${{ secrets.JONNY_TOKEN }}
          SMARTSHEET_TOKEN: ${{ secrets.SMARTSHEET_TOKEN }}
        run: python3 update_dashboard.py

      - name: Commit and push
        run: |
          git config user.email "monteferrante@comcast.net"
          git config user.name "CherieMonte"
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard update $(date +'%B %-d, %Y')"
          git push
