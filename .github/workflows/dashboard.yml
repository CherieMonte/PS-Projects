name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 16 * * *'  # 10:00 AM MT = 16:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update dashboard date
        run: |
          python3 << 'PYEOF'
          import re, datetime
          now = datetime.datetime.now()
          run_date = now.strftime('%Y-%m-%d')
          run_date_long = now.strftime('%B %-d, %Y')
          with open('index.html', 'r') as f:
              html = f.read()
          html = re.sub(r'<strong>\d{4}-\d{2}-\d{2}</strong>', f'<strong>{run_date}</strong>', html)
          html = re.sub(
              r'PerfectServe Executive Dashboard · Scheduled 10:00 AM MT · [^<]+',
              f'PerfectServe Executive Dashboard · Scheduled 10:00 AM MT · {run_date_long}',
              html
          )
          with open('index.html', 'w') as f:
              f.write(html)
          print(f'Date updated to {run_date}')
          PYEOF

      - name: Commit and push
        run: |
          git config user.email "monteferrante@comcast.net"
          git config user.name "CherieMonte"
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard update $(date +'%B %-d, %Y')"
          git push
